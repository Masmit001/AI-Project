<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranslateIt | Premium Translator</title>
    <meta name="description" content="A gorgeous, fast, and feature-rich real-time translation web app.">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>TranslateIt</h1>
            <p>Seamless real-time translation powered by web technologies.</p>
        </header>

        <main class="translator-box">
            <div class="lang-controls">
                <select id="source-lang" class="lang-select" aria-label="Source Language">
                    <option value="en" selected>English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh-CN">Chinese (Simplified)</option>
                    <option value="hi">Hindi</option>
                    <option value="ar">Arabic</option>
                </select>
                <button class="swap-btn" id="swap-lang" title="Swap languages">
                    <i class="fa-solid fa-right-left"></i>
                </button>
                <select id="target-lang" class="lang-select" aria-label="Target Language">
                    <option value="en">English</option>
                    <option value="es" selected>Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh-CN">Chinese (Simplified)</option>
                    <option value="hi">Hindi</option>
                    <option value="ar">Arabic</option>
                </select>
            </div>

            <div class="text-areas">
                <div class="text-section">
                    <textarea id="source-text" placeholder="Enter text here..." aria-label="Source Text"></textarea>
                    <div class="actions">
                        <button class="icon-btn" id="listen-source" title="Listen to source text">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                        <button class="icon-btn" id="copy-source" title="Copy source text">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>

                <div class="text-section target">
                    <textarea id="target-text" placeholder="Translation will appear here..." readonly aria-label="Target Text"></textarea>
                    <div class="actions">
                        <button class="icon-btn" id="listen-target" title="Listen to translation">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                        <button class="icon-btn" id="copy-target" title="Copy translation">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                    <div id="loader" class="loader hidden"></div>
                </div>
            </div>

            <button class="translate-btn" id="translate-btn">Translate</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
